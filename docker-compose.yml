services:
  db:
    image: postgres:16
    container_name: sicat_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: sicat_sf
      POSTGRES_USER: sicat_user
      POSTGRES_PASSWORD: sicat_pass
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sicat_user -d sicat_sf"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: sicat_backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/sicat_sf?currentSchema=sicat
      SPRING_DATASOURCE_USERNAME: sicat_user
      SPRING_DATASOURCE_PASSWORD: sicat_pass
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy

volumes:
  db_data:
